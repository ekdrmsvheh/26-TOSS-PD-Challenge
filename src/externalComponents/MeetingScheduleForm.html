  commitDir = () => this.setState(s => {

  revealGen = () => this.setState(s => ({ genReveal: Math.min(s.genReveal + 1, this.GEN_ORDER.length) }));

  avatar(p, size) {
    const colors = { p1: '#a13d33', p2: '#000000', p3: '#7048e8', p4: '#4e4e4e', p5: '#8a6a3a', p6: '#495057' };
    const palette = ['#a13d33', '#000000', '#7048e8', '#4e4e4e', '#8a6a3a', '#495057', '#e64980', '#1098ad', '#f76707'];
    const n = parseInt(String(p.id).replace(/\D/g, ''), 10) || 0;
    const bg = colors[p.id] || palette[n % palette.length];
    const s = size || 34;
    return `width:${s}px;height:${s}px;border-radius:50%;background:${bg} center/cover no-repeat;${p.img ? `background-image:url('${p.img}');` : ''}color:transparent;font-size:0;flex-shrink:0;border:1px solid rgba(0,0,0,.05);`;

    none: { label: '미응답', bg: '#f1f3f5', fg: '#868e96', textColor: '#9a938a', glyph: '–' },
  };
  candStatusOf(people) {
    const must = (people || []).filter(p => p.roleLabel === '필수');
    const labels = must.map(p => p.label);
    const responded = labels.filter(l => l && l !== '미응답' && l !== '확인 예정');
    let key;
    if (labels.length === 0 || responded.length === 0) key = 'none';
    else if (responded.length < labels.length) key = 'mixed';
    else if (responded.some(l => l === '불가')) key = 'no';
    else key = 'ok';
    const m = this.CAND_STATUS_META[key];
    return {
      key, label: m.label,
      iconStyle: `width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;background:${m.bg};color:${m.fg};`,

  renderVals() {

    // people for setup
    const roleMemos = s.roleMemos || {};
    const attendees = s.attendees || [];
    const attendPeople = this.PEOPLE.filter(p => attendees.includes(p.id));
    const people = attendPeople.map(p => ({
      ...p,
      isOrganizer: p.id === 'p0',
      isMember: p.id !== 'p0',
      avatarStyle: this.avatar(p, 44),

      roleMemo: roleMemos[p.id] || '',

      roleOptions: ['필수', '권장', '선택'].map(r => ({

          (roles[p.id] === r
            ? `background:#fff;color:${r==='필수'?'#a13d33':r==='권장'?'#000000':'#4e4e4e'};box-shadow:0 1px 3px rgba(0,0,0,.12);`
            : `background:transparent;color:#9a938a;`),
      })),
    }));
    const dirSearch = (s.dirSearch || '').trim();
    const dirPending = s.dirPending || [];
    const directoryPeople = this.PEOPLE
      .filter(p => p.id !== 'p0')
      .filter(p => !dirSearch || p.name.includes(dirSearch) || p.title.includes(dirSearch))
      .map(p => ({ ...p, avatarStyle: this.avatar(p, 36), checked: dirPending.includes(p.id), onToggle: this.toggleDirPending(p.id) }));
    const attendeeCount = attendPeople.length;
    const dirNoMatch = directoryPeople.length === 0;
    const dirSelectedCount = dirPending.length;
    const mustCount = attendPeople.filter(p => roles[p.id] === '필수').length + 1;
    const recCount = attendPeople.filter(p => roles[p.id] === '권장').length;
    const optCount = attendPeople.filter(p => roles[p.id] === '선택').length;

    // ===== meeting values =====
    const methodOptions = ['대면', '비대면', '둘 다 가능'].map(m => ({
      label: m, onSelect: this.setMethod(m), checked: s.method === m,
      style: `width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;text-align:left;font-size:14px;font-weight:${s.method === m ? '700' : '500'};padding:10px 10px;border-radius:8px;border:none;background:transparent;color:${s.method === m ? '#000000' : '#1a1a1a'};cursor:pointer;`,
    }));
    const methodFieldLabel = s.method || '방식을 선택하세요';
    const durationOptions = this.DURATION_OPTIONS.map(d => ({
      label: d, onSelect: this.setDuration(d), checked: s.duration === d,
      style: `width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;text-align:left;font-size:14px;font-weight:${s.duration === d ? '700' : '500'};padding:10px 10px;border-radius:8px;border:none;background:transparent;color:${s.duration === d ? '#000000' : '#1a1a1a'};cursor:pointer;`,
    }));
    const durationIsCustom = s.duration === '직접 설정';
    const durationCustom = s.durationCustom || '';
    const durationLabel = durationIsCustom ? (durationCustom ? `${durationCustom}분` : '직접 설정') : (s.duration || '1시간');

    // ===== range calendar =====
    const rangeValid = !!(s.rangeStart && s.rangeEnd);
    const rangeText = rangeValid
      ? (s.rangeStart === s.rangeEnd ? this.mdLabel(s.rangeStart) : `${this.mdLabel(s.rangeStart)} – ${this.mdLabel(s.rangeEnd)}`)
      : (s.rangeStart ? `${this.mdLabel(s.rangeStart)} – 종료일 선택` : '');
    const dayColor = (iso, dow) => {
      if (this.HOLIDAYS[iso]) return '#a13d33';
      if (dow === 0) return '#a13d33';
      if (dow === 6) return '#000000';
      return '#1a1a1a';
    };
    const buildMonth = (year, month, selStart, selEnd, onPickFactory, singleSel) => {
      const startDow = new Date(year, month, 1).getDay();
      const days = new Date(year, month + 1, 0).getDate();
      const cells = [];
      for (let i = 0; i < startDow; i++) cells.push({ blank: true, key: `b${year}${month}${i}`, d: '', hol: '', onPick: () => {}, dayStyle: 'height:44px;', numStyle: 'display:none;', holStyle: 'display:none;' });
      for (let d = 1; d <= days; d++) {
        const iso = this.fmt(year, month, d);
        const dow = new Date(year, month, d).getDay();
        const isPast = iso < this.TODAY;
        const isToday = iso === this.TODAY;
        const isStart = iso === selStart;
        const isEnd = iso === selEnd;
        const inRange = !singleSel && selStart && selEnd && iso > selStart && iso < selEnd;
        const sel = isStart || isEnd || (singleSel && iso === selStart);
        const hol = this.HOLIDAYS[iso] || '';
        let bg = 'transparent', color = isPast ? '#c9c2b8' : dayColor(iso, dow), fw = '600', radius = '11px';
        if (inRange) { bg = '#f5f2ef'; radius = '0'; if (!isPast) color = dayColor(iso, dow); }
        if (sel) { bg = '#000000'; color = '#fff'; fw = '800'; }
        const dayStyle = `position:relative;height:44px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;border-radius:${radius};background:${bg};` +
          (isPast ? 'cursor:not-allowed;' : 'cursor:pointer;') +
          (isToday && !sel ? 'box-shadow:inset 0 0 0 1.5px #b6d4ff;' : '');
        const numStyle = `font-size:13px;font-weight:${fw};color:${color};line-height:1;`;
        const holStyle = `font-size:8.5px;font-weight:700;line-height:1;color:${sel ? '#fff' : '#a13d33'};`;
        cells.push({ key: iso, d, iso, hol, blank: false, dayStyle, numStyle, holStyle, onPick: isPast ? (() => {}) : onPickFactory(iso) });
      }
      return cells;
    };
    const monthName = (y, m) => `${y}년 ${m + 1}월`;
    const rangeCells = buildMonth(s.calYear, s.calMonth, s.rangeStart, s.rangeEnd, (iso) => this.pickRangeDay(iso), false);
    const rangeMonthLabel = monthName(s.calYear, s.calMonth);
    const rangePresetChips = this.RANGE_PRESETS.map(p => ({
      label: p.key, onSelect: this.applyPreset(p),
      style: `font-size:12.5px;font-weight:700;padding:8px 12px;border-radius:9px;border:1px solid ${s.rangePreset === p.key ? '#000000' : '#e5e5e5'};background:${s.rangePreset === p.key ? '#f5f2ef' : '#fff'};color:${s.rangePreset === p.key ? '#000000' : '#4e4e4e'};`,

    const weekdayHeads = this.WD.map((w, i) => ({

    // ===== deadline picker =====
    const dlDate = s.deadline.split('T')[0];

    const dlCells = buildMonth(s.dlYear, s.dlMonth, dlDate, dlDate, (iso) => this.pickDeadlineDay(iso), true);
    const dlMonthLabel = monthName(s.dlYear, s.dlMonth);
    const timeChoices = ['09:00', '12:00', '14:00', '15:00', '17:00', '18:00', '19:00'];
    const timeChips = timeChoices.map(t => ({
      label: t, onSelect: this.setDeadlineTime(t),
      style: `font-size:12.5px;font-weight:700;padding:8px 12px;border-radius:9px;border:1px solid ${dlTime === t ? '#000000' : '#e5e5e5'};background:${dlTime === t ? '#f5f2ef' : '#fff'};color:${dlTime === t ? '#000000' : '#4e4e4e'};`,
    }));
    let deadlineLabel = '미설정';
    if (s.deadline) { const d = new Date(s.deadline); if (!isNaN(d)) { const wd = this.WD[d.getDay()]; deadlineLabel = `${d.getMonth()+1}/${d.getDate()}(${wd}) ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; } }

    // ===== reminder (마감 기준, 미팅 일정에 따라 유동) =====
    const reminderOn = s.reminderOn;
    const dayBeforeIso = this.isoOf((() => { const d = this.parseISO(dlDate); d.setDate(d.getDate() - 1); return d; })());
    const dayBeforeDisabled = dayBeforeIso < this.TODAY; // 당일 미팅면 '마감 하루 전' 불가
    const subHours = (h) => { const dt = new Date(s.deadline); dt.setHours(dt.getHours() - h); const wd = this.WD[dt.getDay()]; return `${dt.getMonth()+1}/${dt.getDate()}(${wd}) ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`; };
    const effReminder = (s.reminder === '마감 하루 전 오전 9시' && dayBeforeDisabled) ? '마감 3시간 전' : s.reminder;
    const reminderCustomHours = s.reminderCustomHours || '';
    const reminderOptions = [
      {
        label: '사용 안 함', onSelect: this.setReminderOff, disabled: false, checked: !reminderOn,
        style: `width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;text-align:left;font-size:14px;font-weight:${!reminderOn ? '700' : '500'};padding:10px 10px;border-radius:8px;border:none;background:transparent;color:${!reminderOn ? '#000000' : '#1a1a1a'};cursor:pointer;`,
      },
      ...this.REMINDER_OPTIONS.map(r => {
        const disabled = r === '마감 하루 전 오전 9시' && dayBeforeDisabled;
        const active = reminderOn && effReminder === r && !disabled;
        return {
          label: r, onSelect: disabled ? (() => {}) : this.setReminder(r), disabled, checked: active,
          style: `width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;text-align:left;font-size:14px;font-weight:${active ? '700' : '500'};padding:10px 10px;border-radius:8px;border:none;background:transparent;` +
            (disabled ? 'color:#cdd3d9;cursor:not-allowed;' : `color:${active ? '#000000' : '#1a1a1a'};cursor:pointer;`),
        };
      }),
    ];
    const reminderFieldLabel = !reminderOn ? '사용 안 함' : effReminder;
    const reminderFieldColor = reminderOn ? '#000000' : '#9a938a';
    let reminderNote;
    let reminderShort;
    if (!reminderOn) {
      reminderNote = '자동 리마인드를 사용하지 않아요. 필요할 때 직접 보낼 수 있어요.';
      reminderShort = '사용 안 함';
    } else if (effReminder === '마감 하루 전 오전 9시') {
      reminderNote = `${this.mdLabel(dayBeforeIso)} 오전 9시에 미응답자에게 알림을 보내요.`;
      reminderShort = `${this.mdLabel(dayBeforeIso)} 09:00`;

    } else { reminderNote = ''; reminderShort = '미설정'; }
    const reminderIsCustom = effReminder === '직접 설정';
    const reminderToggleStyle = `position:relative;width:44px;height:26px;border-radius:13px;flex-shrink:0;transition:background .18s;background:${reminderOn ? '#000000' : '#cfcac2'};`;
    const reminderKnobStyle = `position:absolute;top:3px;left:${reminderOn ? '21px' : '3px'};width:20px;height:20px;border-radius:50%;background:#fff;transition:left .18s;box-shadow:0 1px 3px rgba(0,0,0,.2);`;

    const nonOrgAttend = attendPeople.filter(p => p.id !== 'p0');
    const rolesFilled = nonOrgAttend.length > 0 && nonOrgAttend.every(p => roles[p.id]);
    const setupCanProceed = !!s.title.trim() && !!s.method && rangeValid && rolesFilled;
    let setupErrorMsg = '';
    if (s.setupError) {
      const miss = [];

      if (!s.method) miss.push('미팅 방식');
      if (!rangeValid) miss.push('미팅 일정 범위');

      else if (!attendPeople.every(p => roles[p.id])) miss.push('참석자 역할');
      setupErrorMsg = `${miss.join(', ')}을(를) 먼저 입력해 주세요.`;
    }
    const meetingTitle = s.title.trim() || '3분기 신규 기능 킥오프';
    const meetingPurpose = s.purpose.trim() || '출시 범위와 담당을 확정하고 리스크를 정렬해요.';
    const methodLabel = s.method || '비대면';
    const rangeLabel = rangeValid ? rangeText : '다음 주 (7/13–7/17)';
    const attachmentName = (s.attachment && s.attachment.name) || 'PRD_3분기_신규기능_v1.2.pdf';
    const hasAttachment = !!s.attachment;

    // stepper
    const stepMap = { setup: 0, search: 1, genResp: 2, recompute: 2, adjResp: 2, recommend: 3, confirm: 4, shared: 4 };
    const cur = stepMap[s.screen] ?? 0;
    const stepLabels = ['조건 설정', '후보 요청', '응답 현황', '추천', '확정'];
    const stepScreens = ['setup', 'search', 'genResp', 'recommend', 'confirm'];
    const steps = stepLabels.map((label, i) => {
      const done = i < cur, active = i === cur;
      return {
        num: done ? '✓' : String(i + 1),
        label,
        onGo: this.goStep(stepScreens[i]),
        showBar: i < stepLabels.length - 1,
        dotStyle: `width:24px;height:24px;border-radius:50%;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;` +
          (active ? `background:#000000;color:#fff;` : done ? `background:#c7ddff;color:#000000;` : `background:#e9ecef;color:#9a938a;`),
        labelStyle: `font-size:12.5px;font-weight:700;white-space:nowrap;` + (active ? `color:#000000;` : done ? `color:#4e4e4e;` : `color:#9a938a;`),
      };
    });

    // general candidates display
    const genCandidates = this.GEN.map((c, i) => ({
      ...c, rank: i + 1, dotColor: c.isTop ? '#000000' : '#4e4e4e', hasNote: !!c.note,
    }));
    const searchRanked = genCandidates.map((c, i) => ({
      ...c,
      rankStyle: `width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;` +
        (i === 0 ? 'background:#000000;color:#fff;' : 'background:#f5f5f5;color:#777169;'),
    }));

    // ===== 캘린더 뷰 (스템2) =====
    const showBusyReason = s.showBusyReason;
    const calColors = {
      rank1: { bg: '#000000', fg: '#fff' },
      rank2: { bg: '#5b5249', fg: '#fff' },
      rank3: { bg: '#cdc3b6', fg: '#000000' },
      free:  { bg: '#f5f2ef', fg: '#8a7f72' },
      busy:  { bg: '#f1f3f5', fg: '#c9c2b8' },
    };
    const calHourLabel = (h) => { const ap = h < 12 ? '오전' : '오후'; const hh = h <= 12 ? h : h - 12; return `${ap} ${hh}:00`; };
    const mkSlot = (day, h) => {
      const key = `${day.date}-${h}`;
      const rank = this.CAL_RANK[key] || 0;
      const busyReason = (!rank && this.CAL_BUSY[key]) || '';
      const status = rank ? 'rank' + rank : (busyReason ? 'busy' : 'free');
      const col = calColors[status];
      return {
        key, date: day.date, wd: day.wd, h,
        dayLabel: `${day.wd} ${day.date}`, hourLabel: calHourLabel(h), hourShort: `${h}:00`,
        rank, isRec: !!rank, isBusy: !!busyReason, isFree: status === 'free',
        recLabel: rank ? `${rank}순위` : '', reason: busyReason, showReasonNow: !!busyReason && showBusyReason,
        bg: col.bg, fg: col.fg,
      };
    };
    const calDays = this.CAL_DAYS, calHours = this.CAL_HOURS;
    const calGridRows = calHours.map(h => ({
      hourLabel: calHourLabel(h),
      cells: calDays.map(day => {
        const slot = mkSlot(day, h);
        slot.gridStyle = `position:relative;min-height:46px;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;text-align:center;padding:3px 4px;background:${slot.bg};color:${slot.fg};` +
          (slot.rank === 1 ? 'box-shadow:0 4px 12px rgba(78,50,23,.38);' : '') + (slot.isBusy ? 'border:1px dashed #e0e0e0;' : '');
        return slot;
      }),
    }));
    const calDayRows = calDays.map(day => ({
      dayLabel: `${day.wd} ${day.date}`, wd: day.wd, date: day.date,
      chips: calHours.map(h => {
        const slot = mkSlot(day, h);
        slot.chipLabel = slot.isRec ? `${slot.hourShort} · ${slot.recLabel}` : (slot.showReasonNow ? `${slot.hourShort} · ${slot.reason}` : slot.hourShort);
        slot.chipStyle = `font-size:12px;padding:8px 12px;border-radius:10px;background:${slot.bg};color:${slot.fg};white-space:nowrap;font-weight:${slot.isRec ? 800 : 700};` +
          (slot.rank === 1 ? 'box-shadow:0 4px 12px rgba(78,50,23,.35);' : '') + (slot.isBusy ? 'border:1px dashed #e0e0e0;' : '');
        return slot;
      }),
    }));
    const calHeatRows = calHours.map(h => ({
      hourShort: `${h}`,
      cells: calDays.map(day => {
        const slot = mkSlot(day, h);
        slot.heatStyle = `height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;background:${slot.bg};color:${slot.fg};` +
          (slot.rank === 1 ? 'box-shadow:0 0 0 2px #000000;' : '') + (slot.isBusy ? 'opacity:.85;' : '');
        return slot;
      }),
    }));
    const calBusyList = [];
    calDays.forEach(day => calHours.forEach(h => {
      const key = `${day.date}-${h}`;
      if (!this.CAL_RANK[key] && this.CAL_BUSY[key]) calBusyList.push({ key, dayLabel: `${day.wd} ${day.date}`, hourLabel: calHourLabel(h), reason: this.CAL_BUSY[key] });
    }));
    const calTop3 = [1, 2, 3].map(r => {
      const key = Object.keys(this.CAL_RANK).find(k => this.CAL_RANK[k] === r);
      const [date, h] = key.split('-');
      const day = calDays.find(d => d.date === date);
      return { rank: r, key, dayLabel: `${day.wd} ${date}`, hourLabel: calHourLabel(Number(h)), badgeStyle: `width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;background:${calColors['rank' + r].bg};color:${calColors['rank' + r].fg};` };
    });
    const calLegend = [
      { label: '1순위', bg: '#000000' }, { label: '2·3순위', bg: '#a89a88' },
      { label: '가능', bg: '#f5f2ef' }, { label: '불가', bg: '#f1f3f5' },
    ].map(l => ({ ...l, sw: `width:14px;height:14px;border-radius:4px;flex-shrink:0;background:${l.bg};` + (l.label === '불가' ? 'border:1px dashed #cfcac2;' : '') }));
    const calLegendNoRank = calLegend.filter(l => l.label !== '1순위' && l.label !== '2·3순위');
    const busyReasonToggleStyle = `position:relative;width:44px;height:26px;border-radius:13px;flex-shrink:0;transition:background .18s;background:${showBusyReason ? '#000000' : '#cfcac2'};`;
    const busyReasonKnobStyle = `position:absolute;top:3px;left:${showBusyReason ? '21px' : '3px'};width:20px;height:20px;border-radius:50%;background:#fff;transition:left .18s;box-shadow:0 1px 3px rgba(0,0,0,.2);`;
    // 순위순 전체 가능 시간 (상위 3 + 나머지 빈 슬롯)
    const freeSlots = [];
    calDays.forEach(day => calHours.forEach(h => {
      const key = `${day.date}-${h}`;
      if (this.CAL_RANK[key] || this.CAL_BUSY[key]) return;
      freeSlots.push({ dayLabel: `${day.wd} ${day.date}`, hourLabel: calHourLabel(h) });
    }));
    const calRankedAll = calTop3.map(t => ({ rank: t.rank, dayLabel: t.dayLabel, hourLabel: t.hourLabel, badgeStyle: t.badgeStyle, tag: '필수 3명 모두 가능', tagColor: '#4e4e4e' }));
    freeSlots.forEach((f, i) => calRankedAll.push({
      rank: 4 + i, dayLabel: f.dayLabel, hourLabel: f.hourLabel, tag: '캘린더 비어 있음', tagColor: '#777169',
      badgeStyle: `width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;background:#f0f0f0;color:#777169;`,
    }));
    const calRecShown = s.showAllRec ? calRankedAll : calRankedAll.slice(0, 3);
    const calMoreLabel = s.showAllRec ? '접기' : `+ ${calRankedAll.length - 3}개 더보기 · 순위별 모든 가능 시간`;
    const isCalView = ['D', 'E', 'F', 'G'].includes(s.vSearch);
    const isCalViewTop = ['D', 'E', 'F'].includes(s.vSearch);
    const isSearchGView = s.vSearch === 'G';
    const isSearchNotG = s.vSearch !== 'G';
    const rangeHeadLabel = `${calDays[0].date}(${calDays[0].wd}) ~ ${calDays[calDays.length - 1].date}(${calDays[calDays.length - 1].wd})`;
    const recTop3 = calTop3.map((t, i) => {
      const secondary = i === 0 ? '가장 빠른 시간' : (i === 2 ? '권장 2명 가능' : '');
      const people = attendPeople.map(p => {
        const isMust = roles[p.id] === '필수';
        return {
          avatarStyle: this.avatar(p, 30), name: p.name, title: p.title,
          roleLabel: roles[p.id] || '', roleTag: this.roleTag(roles[p.id]), roleMemo: (roleMemos[p.id] || '').trim(),
          label: isMust ? '가능' : '확인 예정', badgeStyle: this.badge(isMust ? 'ok' : 'pending', true),
        };
      });
      return {
        ...t,
        badgeStyle: `width:38px;height:38px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;background:${calColors['rank' + t.rank].bg};color:${calColors['rank' + t.rank].fg};`,
        primaryTag: `${attendeeCount}명 전원 가능`, secondaryTag: secondary, hasSecondary: !!secondary,
        people, open: !!s.searchCalOpen[t.key], onToggle: this.toggleSearchCal(t.key),
        chevronStyle: `transition:transform .15s;transform:rotate(${s.searchCalOpen[t.key] ? '90deg' : '0deg'});flex-shrink:0;color:#9a938a;`,
        statusIconStyle: `width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;background:${calColors['rank' + t.rank].bg};color:${calColors['rank' + t.rank].fg};`,
        statusGlyph: '✓',
        statusColor: this.candStatusOf(people).color,
        statusDesc: `${attendeeCount}명 전원 가능${secondary ? ' · ' + secondary : ''}`,
      };
    });

    // general response rows
    const reveal = s.genReveal;
    const revealed = new Set(this.GEN_ORDER.slice(0, reveal));
    const genRows = attendPeople.map(p => {
      const role = roles[p.id];
      const resp = this.GEN_RESP[p.id];
      const isRevealed = revealed.has(p.id) && resp;
      const cells = this.GEN.map(c => {
        if (!isRevealed) return { dayLabel: c.dayLabel, timeShort: c.timeShort, label: '미응답', badgeStyle: this.badge('pending', true), hasReason: false, reason: '' };
        const [k, reason] = resp[c.id];
        return { dayLabel: c.dayLabel, timeShort: c.timeShort, label: this.META[k].label, badgeStyle: this.badge(k, true), hasReason: !!reason, reason };
      });
      let statusLine = '응답 대기 중';
      if (isRevealed) statusLine = '응답 완료';
      else if (role === '필수') statusLine = '응답 대기 중 · 추천 보류';
      return {
        rowStyle: `display:grid;grid-template-columns:190px repeat(3,1fr);gap:8px;padding:13px 14px;border-bottom:1px solid #f0f0f0;` + (isRevealed ? '' : 'opacity:.72;'),
        cardStyle: `background:#fff;border-radius:18px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.04);` + (isRevealed ? '' : 'opacity:.72;'),
        person: {
          ...p, avatarStyle: this.avatar(p, 34), roleLabel: role, roleTag: this.roleTag(role), statusLine,
          roleMemo: (roleMemos[p.id] || '').trim(),
        },
        cells,
      };
    });
    const genByCand = this.GEN.map((c, ci) => ({
      ...c,
      people: genRows.map(r => ({
        avatarStyle: r.person.avatarStyle, name: r.person.name, title: r.person.title, roleMemo: r.person.roleMemo,
        roleLabel: r.person.roleLabel, roleTag: r.person.roleTag,
        label: r.cells[ci].label, badgeStyle: r.cells[ci].badgeStyle,
        hasReason: r.cells[ci].hasReason, reason: r.cells[ci].reason,
      })),
    }));
    // ===== genResp \uce98\ub9b0\ub354 \uacb0\ud569 \ubdf0 (D) =====
    const genCalRows = calGridRows.map(r => ({
      hourLabel: r.hourLabel,
      cells: r.cells.map(c => {
        if (!c.isRec) return { ...c, respLabel: '', respStyle: '' };
        const cand = genCandidates[c.rank - 1];
        const cbc = cand && genByCand.find(g => g.id === cand.id);
        if (!cbc) return { ...c, respLabel: '', respStyle: '' };
        const doneCount = cbc.people.filter(p => p.label !== '\ubbf8\uc751\ub2f5').length;
        const hasNo = cbc.people.some(p => p.label === '\ubd88\uac00');
        const total = cbc.people.length;
        const respLabel = `${doneCount}/${total} \uc751\ub2f5`;
        const respStyle = `font-size:9px;font-weight:700;margin-top:2px;` + (hasNo ? 'color:#a13d33;' : 'color:inherit;opacity:.75;');
        return { ...c, respLabel, respStyle };
      }),
    }));
    const genCalCands = genByCand.map((c, i) => {
      const status = this.candStatusOf(c.people);
      const mustBad = c.people.filter(p => p.roleLabel === '필수' && p.label === '불가').map(p => p.name);
      let statusDesc;
      if (status.key === 'no') statusDesc = mustBad.map(n => `${n} 불가`).join(' · ');
      else if (status.key === 'mixed') statusDesc = '필수 참석자 응답 대기 중';
      else if (status.key === 'none') statusDesc = '아직 응답이 없어요';
      else statusDesc = '필수 참석자 전원 가능';
      return {
        ...c, rank: i + 1,
        doneCount: c.people.filter(p => p.label !== '\ubbf8\uc751\ub2f5').length,
        total: c.people.length,
        open: !!s.genCalOpen[c.id],
        onToggle: this.toggleGenCal(c.id),
        chevronStyle: `transition:transform .15s;transform:rotate(${s.genCalOpen[c.id] ? '90deg' : '0deg'});flex-shrink:0;color:#9a938a;`,
        statusIconStyle: status.iconStyle, statusGlyph: status.glyph, statusColor: status.color, statusDesc,
      };
    });
    // 이 응답 매트릭스(GEN_RESP)는 p1·p2·p3를 필수로 고정한 데모 데이터라, 실제 참석자 설정에서
    // 필수 태그가 하나도 없어도(초기화 직후 등) 시뮬레이션이 항상 동작하도록 데모 필수 세트로 보정
    const roleMustIds = attendPeople.filter(p => roles[p.id] === '필수').map(p => p.id);
    const mustIds = roleMustIds.length > 0 ? roleMustIds : ['p3', 'p2', 'p1'];
    const genMustDone = mustIds.length > 0 && mustIds.every(id => revealed.has(id));
    const genCanReveal = reveal < this.GEN_ORDER.length;
    const genMustPending = !genMustDone;
    const pendingMust = mustIds.filter(id => !revealed.has(id)).map(id => this.PEOPLE.find(p => p.id === id).name);
    const genPendingNote = s.reminded ? '리마인드를 보냈어요' : (pendingMust.length ? `필수 미응답: ${pendingMust.join(', ')}` : '권장·선택 참석자 응답 대기 중');
    let genStatusNote, genStatusStyle;
    if (reveal === 0) {
      genStatusNote = '아직 응답한 참석자가 없어요.';
      genStatusStyle = 'font-size: 14px; color: #777169; line-height: 1.5;';
    } else if (!genMustDone) {
      genStatusNote = `일부 참석자가 응답했어요. 아직 필수 참석자(${pendingMust.join(', ') || '전원'}) 응답을 기다리고 있어요.`;
      genStatusStyle = 'font-size: 14px; color: #4e4e4e; line-height: 1.5;';
    } else {
      genStatusNote = '필수 3명의 응답이 모두 확정됐어요. 권장 강민재님과 선택 윤서아님은 아직 미응답이지만, 필수가 확정됐으니 후보를 다시 계산할 수 있어요.';
      genStatusStyle = 'font-size: 14px; color: #4e4e4e; line-height: 1.5;';
    }
    const genFailBtnStyle = `font-size:11.5px;font-weight:700;padding:7px 12px;border-radius:8px;border:none;white-space:nowrap;cursor:pointer;` +
      (s.genFailView ? 'background:#a13d33;color:#fff;' : 'background:transparent;color:#a13d33;');
    const genSimOptions = [
      { key: 'reset', label: '응답 없음', onSelect: () => this.setGenSim('reset') },
      { key: 'partial', label: '일부 응답', onSelect: () => this.setGenSim('partial') },
      { key: 'mustAll', label: '필수 참석자 모두 응답', onSelect: () => this.setGenSim('mustAll') },
    ].map(o => {
      const checked = !s.genFailView && ((o.key === 'reset' && reveal === 0) || (o.key === 'partial' && reveal > 0 && !genMustDone) || (o.key === 'mustAll' && genMustDone));
      return {
        ...o, checked,
        style: `font-size:11.5px;font-weight:700;padding:7px 12px;border-radius:8px;border:none;white-space:nowrap;` +
          (checked ? 'background:#fff;color:#000000;box-shadow:0 1px 3px rgba(0,0,0,.12);' : 'background:transparent;color:#777169;cursor:pointer;'),
      };
    });
    const genReminderDesc = reminderOn ? `${reminderShort} 자동 리마인드를 발송해요.` : '자동 리마인드가 설정되지 않았어요.';

    // tab styles
    const tabBase = `font-size:12.5px;font-weight:700;padding:7px 14px;border-radius:8px;border:none;`;
    const tabOrgStyle = tabBase + (isOrganizer ? `background:#fff;color:#000000;box-shadow:0 1px 3px rgba(0,0,0,.1);` : `background:transparent;color:#777169;`);
    const tabAttStyle = tabBase + (!isOrganizer ? `background:#fff;color:#000000;box-shadow:0 1px 3px rgba(0,0,0,.1);` : `background:transparent;color:#777169;`);

    // ===== recompute: general candidates all fail =====
    const genFailCands = this.GEN.map(c => {
      // reasons: 필수 who is no
      const bad = mustIds.filter(id => this.GEN_RESP[id] && this.GEN_RESP[id][c.id][0] === 'no')
        .map(id => this.PEOPLE.find(p => p.id === id));
      const reason = bad.map(p => `${p.name} 불가`).join(' · ');
      const cbc = genByCand.find(g => g.id === c.id);
      const status = this.candStatusOf(cbc ? cbc.people : []);
      return {
        ...c, reason, people: cbc ? cbc.people : [],
        open: !!s.genCalOpen[c.id], onToggle: this.toggleGenCal(c.id),
        chevronStyle: `transition:transform .15s;transform:rotate(${s.genCalOpen[c.id] ? '90deg' : '0deg'});flex-shrink:0;color:#9a938a;`,
        statusIconStyle: status.iconStyle, statusGlyph: status.glyph, statusColor: status.color,

    });

    // ===== adjust responses =====
    const adjRevealed = new Set(this.ADJ_ORDER.slice(0, s.adjReveal));
    const mustPeople = attendPeople.filter(p => roles[p.id] === '필수');
    const availOf = (cid, p) => {
      const c = this.ADJ.find(x => x.id === cid);
      const conf = c.conflicts.find(x => x.p === p.id);
      if (conf) return adjRevealed.has(p.id) ? this.ADJ_RESP[p.id][cid] : 'pending';
      if (this.ADJ_AVAIL[cid] && this.ADJ_AVAIL[cid][p.id]) return this.ADJ_AVAIL[cid][p.id];
      return 'free';
    };
    const adjRows = mustPeople.map(p => {
      const cells = this.ADJ.map(c => {
        const conf = c.conflicts.find(x => x.p === p.id);
        if (!conf) return { label: '가능', badgeStyle: this.badge('free', true), sub: '캘린더 비어 있음' };
        const isR = adjRevealed.has(p.id);
        if (!isR) return { label: '미응답', badgeStyle: this.badge('pending', true), sub: `${conf.text} 조정 확인 중` };
        const k = this.ADJ_RESP[p.id][c.id];
        const subs = { canAdjust: `${conf.text} 옮길 수 있어요`, checking: '관계자에게 확인 중', hard: '변경이 어려워요' };
        return { label: this.META[k].label, badgeStyle: this.badge(k, true), sub: subs[k] };
      });
      return { person: { ...p, avatarStyle: this.avatar(p, 34), roleTag: this.roleTag('필수') }, cells };
    });
    const adjCanReveal = s.adjReveal < this.ADJ_ORDER.length;
    const showRecommendBtn = s.adjReveal >= 1;
    const adjCandidates = this.ADJ.map(c => {
      const confNames = c.conflicts.map(x => this.PEOPLE.find(pp => pp.id === x.p).name);
      return { ...c, conflictLine: `${confNames.join(', ')}님의 기존 일정과 겹쳐요` };
    });

    // ===== recommendation =====
    const recPeople = attendPeople.filter(p => roles[p.id] === '권장');
    const optPeople = attendPeople.filter(p => roles[p.id] === '선택');
    const cntOk = (arr, cid) => arr.filter(p => ['ok', 'free'].includes(availOf(cid, p))).length;
    const buildCand = (c) => {
      const mustAv = mustPeople.map(p => ({ p, k: availOf(c.id, p) }));
      const hasHard = mustAv.some(x => x.k === 'hard');
      const pendingMust = mustAv.filter(x => ['pending', 'checking'].includes(x.k));
      const adjustMust = mustAv.filter(x => x.k === 'canAdjust');
      let status = 'ready';
      if (hasHard) status = 'excluded';
      else if (pendingMust.length) status = 'hold';
      const recOk = cntOk(recPeople, c.id), optOk = cntOk(optPeople, c.id);
      const tradeoff = adjustMust.length
        ? `${adjustMust.map(x => x.p.name).join(', ')}님이 기존 일정을 조정해야 해요`
        : '기존 일정 조정 없이 가능해요';
      return {
        id: c.id, dayLabel: c.dayLabel, timeLabel: c.timeLabel,
        dayTime: `${c.dayLabel} ${c.timeLabel}`,
        status,
        mustText: status === 'ready' ? '필수 3명 모두 참석 가능' : status === 'hold' ? `필수 ${pendingMust.map(x => x.p.name).join(', ')}님 확인 중` : `${mustAv.filter(x => x.k === 'hard').map(x => x.p.name).join(', ')}님 조정 어려움`,
        tradeoff,
        recText: recPeople.length ? `권장 ${recOk}/${recPeople.length}명 참여` : '권장 없음',
        optText: optPeople.length ? `선택 ${optOk}/${optPeople.length}명 참여` : '선택 없음',
        adjustMust, pendingMust, recOk, optOk,
      };
    };
    const allCands = this.ADJ.map(buildCand);
    const mainCands = allCands.filter(c => c.status !== 'excluded');
    const excludedCands = allCands.filter(c => c.status === 'excluded');
    const recommendedId = (mainCands.find(c => c.status === 'ready') || {}).id;

    const statusMeta = {
      ready: { label: '추천', c: '#4e4e4e', bg: '#f5f2ef' },

      excluded: { label: '제외', c: '#a13d33', bg: '#f3ece8' },

    const recCards = mainCands.map(c => {
      const isRec = c.id === recommendedId;
      const bullets = [];
      bullets.push({ ok: true, t: c.mustText });
